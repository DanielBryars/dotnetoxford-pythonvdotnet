<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   xmlns:dc="http://purl.org/dc/elements/1.1/"
   xmlns:cc="http://creativecommons.org/ns#"
   xmlns:rdf="http://www.w3.org/1999/02/22/rdf/0.0/"
   xmlns:svg="http://www.w3.org/2000/svg"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.0.dtd"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   width="595mm"
   height="842mm"
   viewBox="0 0 595 842"
   version="1.1"
   id="SVGRoot"
   inkscape:version="1.3"
   sodipodi:docname="python_vs_csharp_poster.svg">
  <defs id="defs2">
    <!-- Radial glow for VS -->
    <radialGradient id="vsGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0"/>
    </radialGradient>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a0a"/>
      <stop offset="50%" style="stop-color:#2d0a0a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <!-- Gold text gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE87C"/>
      <stop offset="40%" style="stop-color:#FFD700"/>
      <stop offset="60%" style="stop-color:#DAA520"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <!-- Silver gradient -->
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="50%" style="stop-color:#C0C0C0"/>
      <stop offset="100%" style="stop-color:#808080"/>
    </linearGradient>
    <!-- Red banner gradient -->
    <linearGradient id="redBanner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#CC0000"/>
      <stop offset="100%" style="stop-color:#8B0000"/>
    </linearGradient>
    <!-- Corner ornament pattern -->
    <linearGradient id="ornamentGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
  </defs>

  <!-- ==================== BACKGROUND ==================== -->
  <g inkscape:groupmode="layer" id="layer-background" inkscape:label="Background">
    <rect width="595" height="842" fill="url(#bgGrad)" id="bg"/>
    <!-- Subtle texture lines -->
    <g opacity="0.03">
      <line x1="0" y1="0" x2="595" y2="842" stroke="#FFD700" stroke-width="0.5"/>
      <line x1="595" y1="0" x2="0" y2="842" stroke="#FFD700" stroke-width="0.5"/>
      <line x1="297" y1="0" x2="297" y2="842" stroke="#FFD700" stroke-width="0.5"/>
      <line x1="0" y1="421" x2="595" y2="421" stroke="#FFD700" stroke-width="0.5"/>
    </g>
  </g>

  <!-- ==================== BORDER & ORNAMENTS ==================== -->
  <g inkscape:groupmode="layer" id="layer-border" inkscape:label="Border and Ornaments">
    <!-- Outer border -->
    <rect x="15" y="15" width="565" height="812" fill="none" stroke="#DAA520" stroke-width="2" rx="3" id="border-outer"/>
    <!-- Inner border -->
    <rect x="22" y="22" width="551" height="798" fill="none" stroke="#DAA520" stroke-width="0.8" rx="2" id="border-inner"/>
    <!-- Decorative double border -->
    <rect x="26" y="26" width="543" height="790" fill="none" stroke="#DAA520" stroke-width="0.3" rx="1.5" id="border-detail"/>

    <!-- Corner ornaments - Top Left -->
    <g transform="translate(30,30)" id="corner-tl">
      <path d="M0,25 Q0,0 25,0" fill="none" stroke="url(#ornamentGold)" stroke-width="2"/>
      <path d="M0,18 Q0,3 18,3" fill="none" stroke="url(#ornamentGold)" stroke-width="1"/>
      <circle cx="3" cy="3" r="2" fill="#DAA520"/>
    </g>
    <!-- Corner ornaments - Top Right -->
    <g transform="translate(565,30) scale(-1,1)" id="corner-tr">
      <path d="M0,25 Q0,0 25,0" fill="none" stroke="url(#ornamentGold)" stroke-width="2"/>
      <path d="M0,18 Q0,3 18,3" fill="none" stroke="url(#ornamentGold)" stroke-width="1"/>
      <circle cx="3" cy="3" r="2" fill="#DAA520"/>
    </g>
    <!-- Corner ornaments - Bottom Left -->
    <g transform="translate(30,812) scale(1,-1)" id="corner-bl">
      <path d="M0,25 Q0,0 25,0" fill="none" stroke="url(#ornamentGold)" stroke-width="2"/>
      <path d="M0,18 Q0,3 18,3" fill="none" stroke="url(#ornamentGold)" stroke-width="1"/>
      <circle cx="3" cy="3" r="2" fill="#DAA520"/>
    </g>
    <!-- Corner ornaments - Bottom Right -->
    <g transform="translate(565,812) scale(-1,-1)" id="corner-br">
      <path d="M0,25 Q0,0 25,0" fill="none" stroke="url(#ornamentGold)" stroke-width="2"/>
      <path d="M0,18 Q0,3 18,3" fill="none" stroke="url(#ornamentGold)" stroke-width="1"/>
      <circle cx="3" cy="3" r="2" fill="#DAA520"/>
    </g>

    <!-- Horizontal decorative dividers -->
    <g id="divider-top" transform="translate(297,95)">
      <line x1="-220" y1="0" x2="-30" y2="0" stroke="#DAA520" stroke-width="0.6"/>
      <line x1="30" y1="0" x2="220" y2="0" stroke="#DAA520" stroke-width="0.6"/>
      <polygon points="0,-4 4,0 0,4 -4,0" fill="#DAA520"/>
    </g>
  </g>

  <!-- ==================== HEADER TEXT ==================== -->
  <g inkscape:groupmode="layer" id="layer-header" inkscape:label="Header Text">
    <!-- Top presenter line -->
    <text x="297" y="62" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="10" fill="#DAA520" letter-spacing="6" id="text-presents">
      .NET OXFORD PRESENTS
    </text>

    <!-- Decorative stars around presents -->
    <text x="155" y="63" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#DAA520">&#9733;</text>
    <text x="439" y="63" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#DAA520">&#9733;</text>

    <!-- Main title -->
    <text x="297" y="85" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="16" fill="url(#goldGrad)" letter-spacing="8" font-weight="bold" id="text-main-event">
      THE MAIN EVENT
    </text>
  </g>

  <!-- ==================== FIGHT NIGHT BANNER ==================== -->
  <g inkscape:groupmode="layer" id="layer-banner" inkscape:label="Fight Night Banner">
    <!-- Red ribbon banner -->
    <polygon points="80,110 515,110 525,130 515,150 80,150 70,130" fill="url(#redBanner)" stroke="#FFD700" stroke-width="0.8" id="banner-bg"/>
    <!-- Banner folds -->
    <polygon points="70,130 55,125 55,135" fill="#5a0000"/>
    <polygon points="525,130 540,125 540,135" fill="#5a0000"/>

    <text x="297" y="137" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="14" fill="#FFE87C" letter-spacing="12" font-weight="bold" id="text-fight-night">
      FIGHT NIGHT
    </text>
  </g>

  <!-- ==================== SUBTITLE ==================== -->
  <g inkscape:groupmode="layer" id="layer-subtitle" inkscape:label="Subtitle">
    <text x="297" y="180" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="9" fill="#C0C0C0" letter-spacing="4" id="text-battle">
      THE BATTLE FOR MACHINE LEARNING SUPREMACY
    </text>

    <!-- Decorative line under subtitle -->
    <line x1="100" y1="190" x2="495" y2="190" stroke="#DAA520" stroke-width="0.4" opacity="0.6"/>
  </g>

  <!-- ==================== PYTHON CORNER (LEFT) ==================== -->
  <g inkscape:groupmode="layer" id="layer-python" inkscape:label="Python Logo and Text">
    <!-- Python side label -->
    <text x="160" y="225" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="8" fill="#DAA520" letter-spacing="3" id="text-challenger">
      THE CHALLENGER
    </text>

    <!-- Python Logo - Simplified two-snake design -->
    <g id="python-logo" transform="translate(160, 350)">
      <!-- Logo background circle -->
      <circle cx="0" cy="0" r="80" fill="none" stroke="#DAA520" stroke-width="0.5" opacity="0.3"/>

      <!-- Python blue half -->
      <path d="M-5,-55 C-5,-60 -2,-65 5,-65 L25,-65 C35,-65 42,-58 42,-48 L42,-28
               C42,-18 35,-11 25,-11 L-5,-11 L-5,-20 L20,-20 C24,-20 27,-23 27,-27
               L27,-40 C27,-44 24,-47 20,-47 L5,-47 C1,-47 -2,-44 -2,-40 L-2,-30
               L-15,-30 L-15,-48 C-15,-52 -12,-55 -5,-55 Z"
            fill="#306998" id="python-blue"/>
      <!-- Blue snake eye -->
      <circle cx="8" cy="-52" r="4" fill="#FFD43B" id="python-eye-blue"/>
      <circle cx="8" cy="-52" r="2" fill="#306998"/>

      <!-- Python yellow half (rotated 180) -->
      <path d="M5,55 C5,60 2,65 -5,65 L-25,65 C-35,65 -42,58 -42,48 L-42,28
               C-42,18 -35,11 -25,11 L5,11 L5,20 L-20,20 C-24,20 -27,23 -27,27
               L-27,40 C-27,44 -24,47 -20,47 L-5,47 C-1,47 2,44 2,40 L2,30
               L15,30 L15,48 C15,52 12,55 5,55 Z"
            fill="#FFD43B" id="python-yellow"/>
      <!-- Yellow snake eye -->
      <circle cx="-8" cy="52" r="4" fill="#306998" id="python-eye-yellow"/>
      <circle cx="-8" cy="52" r="2" fill="#FFD43B"/>
    </g>

    <!-- PYTHON name -->
    <text x="160" y="470" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="28" fill="url(#goldGrad)" letter-spacing="6" font-weight="bold" id="text-python">
      PYTHON
    </text>

    <!-- Python stats -->
    <text x="160" y="500" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="8" fill="#C0C0C0" letter-spacing="2" id="text-python-stat1">
      EST. 1991  |  WEIGHT: LIGHTWEIGHT
    </text>
    <text x="160" y="516" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="8" fill="#C0C0C0" letter-spacing="2" id="text-python-stat2">
      STYLE: DYNAMIC TYPING
    </text>
    <text x="160" y="532" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="8" fill="#C0C0C0" letter-spacing="2" id="text-python-stat3">
      REACH: NUMPY, PYTORCH, MATPLOTLIB
    </text>
    <text x="160" y="548" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="8" fill="#DAA520" letter-spacing="2" font-style="italic" id="text-python-stat4">
      "THE INDENTATION ASSASSIN"
    </text>
  </g>

  <!-- ==================== C# CORNER (RIGHT) ==================== -->
  <g inkscape:groupmode="layer" id="layer-csharp" inkscape:label="C# Logo and Text">
    <!-- C# side label -->
    <text x="435" y="225" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="8" fill="#DAA520" letter-spacing="3" id="text-defender">
      THE DEFENDER
    </text>

    <!-- C# Logo -->
    <g id="csharp-logo" transform="translate(435, 350)">
      <!-- Logo background circle -->
      <circle cx="0" cy="0" r="80" fill="none" stroke="#DAA520" stroke-width="0.5" opacity="0.3"/>

      <!-- Purple hexagonal background -->
      <path d="M-50,-30 L-50,30 L0,60 L50,30 L50,-30 L0,-60 Z"
            fill="#68217A" stroke="#9B4DCA" stroke-width="1" id="csharp-hex"/>

      <!-- C letter -->
      <path d="M-8,-28 C-25,-28 -35,-17 -35,0 C-35,17 -25,28 -8,28 C0,28 7,24 12,18
               L5,10 C2,14 -2,17 -8,17 C-18,17 -23,10 -23,0 C-23,-10 -18,-17 -8,-17
               C-2,-17 2,-14 5,-10 L12,-18 C7,-24 0,-28 -8,-28 Z"
            fill="white" id="csharp-c"/>

      <!-- Hash/Sharp symbol -->
      <g transform="translate(22,0)" id="csharp-hash">
        <line x1="-8" y1="-18" x2="-12" y2="18" stroke="white" stroke-width="4"/>
        <line x1="2" y1="-18" x2="-2" y2="18" stroke="white" stroke-width="4"/>
        <line x1="-16" y1="-7" x2="6" y2="-7" stroke="white" stroke-width="3.5"/>
        <line x1="-14" y1="7" x2="8" y2="7" stroke="white" stroke-width="3.5"/>
      </g>
    </g>

    <!-- C# name -->
    <text x="435" y="470" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="28" fill="url(#goldGrad)" letter-spacing="6" font-weight="bold" id="text-csharp">
      C#
    </text>

    <!-- C# stats -->
    <text x="435" y="500" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="8" fill="#C0C0C0" letter-spacing="2" id="text-csharp-stat1">
      EST. 2000  |  WEIGHT: HEAVYWEIGHT
    </text>
    <text x="435" y="516" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="8" fill="#C0C0C0" letter-spacing="2" id="text-csharp-stat2">
      STYLE: STATIC TYPING
    </text>
    <text x="435" y="532" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="8" fill="#C0C0C0" letter-spacing="2" id="text-csharp-stat3">
      REACH: ML.NET, LINQ, RANGES
    </text>
    <text x="435" y="548" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="8" fill="#DAA520" letter-spacing="2" font-style="italic" id="text-csharp-stat4">
      "THE ENTERPRISE ENFORCER"
    </text>
  </g>

  <!-- ==================== VS CENTERPIECE ==================== -->
  <g inkscape:groupmode="layer" id="layer-vs" inkscape:label="VS Center">
    <!-- Glow behind VS -->
    <circle cx="297" cy="360" r="60" fill="url(#vsGlow)" id="vs-glow"/>

    <!-- VS circle -->
    <circle cx="297" cy="360" r="35" fill="#1a0a0a" stroke="#FFD700" stroke-width="2" id="vs-circle"/>
    <circle cx="297" cy="360" r="30" fill="none" stroke="#DAA520" stroke-width="0.5" id="vs-circle-inner"/>

    <!-- VS text -->
    <text x="297" y="370" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="26" fill="url(#goldGrad)" font-weight="bold" letter-spacing="2" id="text-vs">
      VS
    </text>

    <!-- Connecting lines -->
    <line x1="230" y1="360" x2="262" y2="360" stroke="#DAA520" stroke-width="0.6" id="vs-line-left"/>
    <line x1="332" y1="360" x2="365" y2="360" stroke="#DAA520" stroke-width="0.6" id="vs-line-right"/>
  </g>

  <!-- ==================== UNDERCARD / ROUND INFO ==================== -->
  <g inkscape:groupmode="layer" id="layer-undercard" inkscape:label="Undercard Details">
    <!-- Decorative divider -->
    <g transform="translate(297,580)">
      <line x1="-200" y1="0" x2="-10" y2="0" stroke="#DAA520" stroke-width="0.5"/>
      <line x1="10" y1="0" x2="200" y2="0" stroke="#DAA520" stroke-width="0.5"/>
      <polygon points="0,-3 3,0 0,3 -3,0" fill="#DAA520"/>
    </g>

    <!-- Round cards -->
    <text x="297" y="608" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="9" fill="#DAA520" letter-spacing="5" id="text-rounds-header">
      SCHEDULED ROUNDS
    </text>

    <!-- Round 1 -->
    <text x="297" y="635" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="8" fill="#C0C0C0" letter-spacing="2" id="text-round1">
      ROUND 1: SYNTAX SHOWDOWN
    </text>
    <!-- Round 2 -->
    <text x="297" y="652" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="8" fill="#C0C0C0" letter-spacing="2" id="text-round2">
      ROUND 2: RANGE &amp; SLICE OPERATIONS
    </text>
    <!-- Round 3 -->
    <text x="297" y="669" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="8" fill="#C0C0C0" letter-spacing="2" id="text-round3">
      ROUND 3: NUMPY vs LINQ PROJECTIONS
    </text>
    <!-- Round 4 -->
    <text x="297" y="686" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="8" fill="#C0C0C0" letter-spacing="2" id="text-round4">
      ROUND 4: MATPLOTLIB vs ???
    </text>
    <!-- Round 5 -->
    <text x="297" y="703" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="8" fill="#C0C0C0" letter-spacing="2" id="text-round5">
      ROUND 5: PYTORCH &amp; THE ML KNOCKOUT
    </text>
  </g>

  <!-- ==================== BOTTOM DETAILS ==================== -->
  <g inkscape:groupmode="layer" id="layer-footer" inkscape:label="Footer Details">
    <!-- Decorative divider -->
    <g transform="translate(297,725)">
      <line x1="-200" y1="0" x2="-10" y2="0" stroke="#DAA520" stroke-width="0.5"/>
      <line x1="10" y1="0" x2="200" y2="0" stroke="#DAA520" stroke-width="0.5"/>
      <polygon points="0,-3 3,0 0,3 -3,0" fill="#DAA520"/>
    </g>

    <!-- Venue / Event info -->
    <text x="297" y="752" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="10" fill="url(#goldGrad)" letter-spacing="5" id="text-venue-label">
      LIVE AT
    </text>

    <text x="297" y="772" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="16" fill="url(#goldGrad)" letter-spacing="4" font-weight="bold" id="text-venue">
      .NET OXFORD
    </text>

    <!-- Date placeholder -->
    <text x="297" y="795" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="9" fill="#C0C0C0" letter-spacing="3" id="text-date">
      FEBRUARY 2026
    </text>

    <!-- Bottom decorative stars -->
    <g transform="translate(297, 810)" id="bottom-stars">
      <text x="-30" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="6" fill="#DAA520">&#9733;</text>
      <text x="-15" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="4" fill="#DAA520">&#9733;</text>
      <text x="0" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="6" fill="#DAA520">&#9733;</text>
      <text x="15" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="4" fill="#DAA520">&#9733;</text>
      <text x="30" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="6" fill="#DAA520">&#9733;</text>
    </g>
  </g>

  <!-- ==================== METADATA ==================== -->
  <metadata id="metadata1">
    <rdf:RDF>
      <cc:Work rdf:about="">
        <dc:title>Python vs C# - ML Fight Night Poster</dc:title>
        <dc:description>Boxing-style poster for .NET Oxford talk comparing Python and C# for machine learning</dc:description>
      </cc:Work>
    </rdf:RDF>
  </metadata>
</svg>